<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – World Chat</title>
  <meta name="description" content="Login or join as a guest to World Chat – Real-time Global Chat Application" />
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>" />
</head>
<body class="auth-body">
<div class="auth-page">
  <div class="auth-card glass">
    <div class="auth-logo">
      <span class="logo-icon">🌍</span>
      <h1>World Chat</h1>
      <p>Real-time Global Chat Application</p>
    </div>

    <div class="auth-form">
      <h2>Welcome Back</h2>

      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary" id="loginBtn">
          <span>🔑</span> Sign In
        </button>
      </form>

      <div class="divider">or</div>

      <button class="btn btn-ghost" id="guestBtn">
        <span>👤</span> Continue as Guest
      </button>

      <div class="auth-footer">
        Don't have an account? <a href="/register">Sign up</a>
      </div>
    </div>

  </div>
</div>

<!-- Fixed top-right theme toggle -->
<button class="icon-btn" id="themeToggle" title="Toggle theme"
  style="position:fixed;top:16px;right:16px;z-index:10;">🌙</button>

<script>
  // ─── Theme ────────────────────────────────────────────────────────
  const saved = localStorage.getItem('wc_theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  document.getElementById('themeToggle').textContent = saved === 'dark' ? '☀️' : '🌙';

  document.getElementById('themeToggle').addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('wc_theme', next);
    document.getElementById('themeToggle').textContent = next === 'dark' ? '☀️' : '🌙';
  });

  // ─── Show messages ────────────────────────────────────────────────
  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('show');
    document.getElementById('successMsg').classList.remove('show');
  }
  function showSuccess(msg) {
    const el = document.getElementById('successMsg');
    el.textContent = msg;
    el.classList.add('show');
    document.getElementById('errorMsg').classList.remove('show');
  }

  // ─── Login Form ───────────────────────────────────────────────────
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    btn.disabled = true; btn.innerHTML = '⏳ Signing in…';

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    try {
      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({email, password}),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Login failed');

      sessionStorage.setItem('wc_token', data.access_token);
      sessionStorage.setItem('wc_user', JSON.stringify(data.user));
      sessionStorage.removeItem('wc_guest');
      showSuccess('✅ Login successful! Redirecting…');
      setTimeout(() => window.location.href = '/', 700);

    } catch(err) {
      showError('❌ ' + err.message);
      btn.disabled = false; btn.innerHTML = '<span>🔑</span> Sign In';
    }
  });

  // ─── Guest Access ─────────────────────────────────────────────────
  document.getElementById('guestBtn').addEventListener('click', () => {
    const num = Math.floor(1000 + Math.random() * 9000);
    const guestName = `Guest_${num}`;
    sessionStorage.setItem('wc_guest', guestName);
    sessionStorage.removeItem('wc_token');
    sessionStorage.removeItem('wc_user');
    window.location.href = '/';
  });

  // Redirect if already logged in
  if (sessionStorage.getItem('wc_token') || sessionStorage.getItem('wc_guest')) {
    window.location.href = '/';
  }
</script>
</body>
</html>
